<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADSEUM — Sign in</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="min-h-screen bg-[#faf9f7] text-[#1a1a1a] flex items-center justify-center px-4"
    style="font-family: 'DM Sans', sans-serif;">

    <div class="w-full max-w-md text-center">
        <div class="cms-header-stripe mb-0 rounded-t-2xl"></div>
        <div class="cms-card rounded-t-none border-t-0 p-8">
            <p class="text-xs uppercase tracking-[0.25em] text-gray-400 font-mono">ADSEUM</p>
            <h1 class="mt-3 text-2xl font-bold"
                style="font-family: 'DIN Alternate', sans-serif; letter-spacing: 0.06em;">
                Welcome back
            </h1>
            <p class="mt-3 text-sm text-gray-500 leading-relaxed">
                Sign in to access the editor, letter designer, and other tools.
            </p>
            <div class="mt-6 flex flex-col items-center gap-4">
                <button id="google-sign-in" class="cms-btn cms-btn-primary w-full justify-center py-3">
                    Sign in with Google
                </button>

                <div class="w-full flex items-center gap-3 text-gray-300">
                    <hr class="flex-1 border-gray-200"><span class="text-xs uppercase tracking-wider">or</span>
                    <hr class="flex-1 border-gray-200">
                </div>

                <!-- Step 1: email -->
                <form id="email-step" class="w-full flex flex-col gap-2">
                    <input id="email-input" type="email" class="cms-input w-full text-center"
                        placeholder="name@example.com" required>
                    <button type="submit" class="cms-btn cms-btn-secondary w-full justify-center py-3">
                        Continue with email
                    </button>
                </form>

                <!-- Step 2: choose method -->
                <div id="method-step" class="hidden w-full flex flex-col gap-3">
                    <p class="text-sm text-gray-500">
                        Signing in as <strong id="method-email-label"></strong>
                        <button id="change-email" type="button" class="text-gray-400 hover:text-gray-700 underline ml-1 text-xs">change</button>
                    </p>

                    <!-- Password option -->
                    <form id="password-form" class="w-full flex flex-col gap-2">
                        <input id="password-input" type="password" class="cms-input w-full text-center"
                            placeholder="Password" required>
                        <button type="submit" class="cms-btn cms-btn-primary w-full justify-center py-3">
                            Sign in with password
                        </button>
                    </form>

                    <div class="w-full flex items-center gap-3 text-gray-300">
                        <hr class="flex-1 border-gray-200"><span class="text-xs uppercase tracking-wider">or</span>
                        <hr class="flex-1 border-gray-200">
                    </div>

                    <!-- Email link option -->
                    <button id="send-link-btn" type="button" class="cms-btn cms-btn-secondary w-full justify-center py-3">
                        Send sign-in link via email
                    </button>
                </div>

                <p id="email-link-sent" class="hidden text-sm text-green-600">
                    Link sent! Check your inbox and click the link to sign in.
                </p>

                <a href="/" class="text-sm text-gray-400 hover:text-gray-700 transition">View live website</a>
            </div>
        </div>
    </div>

    <!-- Toast container -->
    <div id="cms-toast" class="cms-toast" role="alert"></div>

    <script type="module" src="login.js"></script>
</body>

</html>

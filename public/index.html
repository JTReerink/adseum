<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADSEUM - Empowering Queer Art</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-[#FDFDFD] overflow-x-hidden overflow-y-auto relative w-full">
    <nav id="navbar">
        <div id="nav-logo"></div>
        <ul id="nav-links" class="nav-links"></ul>
    </nav>

    <section id="hero" class="w-full h-screen flex flex-col justify-center items-center relative">
        <div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
            <div class="blob absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-pink-300/30 blur-[100px] rounded-full"></div>
            <div class="blob absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] bg-yellow-200/40 blur-[120px] rounded-full"></div>
            <div class="blob absolute top-[20%] right-[10%] w-[40vw] h-[40vw] bg-blue-200/30 blur-[80px] rounded-full"></div>
        </div>

        <div id="logo-grid" class="relative z-10 w-full px-4 flex flex-wrap justify-center gap-y-4"></div>

        <div class="absolute bottom-10 z-10 opacity-0 subtitle-anim">
            <div id="hero-subtitle-content" class="hero-rich-text rich-content text-center text-gray-500 tracking-[0.2em] text-sm md:text-base font-bold">
                <p>Empowering Queer Art</p>
            </div>
        </div>
    </section>

    <main id="sections-root"></main>

    <script type="module" src="script.js"></script>
</body>

</html>

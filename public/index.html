<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; font-src 'self' data: https:; img-src 'self' data: https:; connect-src 'self' https:;">
    
    <title>ADSEUM - Empowering Queer Art</title>
    <meta name="description" content="ADSEUM is dedicated to empowering queer art through dynamic digital experiences and exhibitions.">
    
    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="ADSEUM - Empowering Queer Art">
    <meta property="og:description" content="ADSEUM is dedicated to empowering queer art through dynamic digital experiences and exhibitions.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://adseum.nl">
    
    <link rel="icon" type="image/png" href="/favicon.png">
    <!-- Font Preloads -->
    <link rel="preload" href="./fonts/DMSans_18pt-Regular.ttf" as="font" type="font/ttf" crossorigin="anonymous">
    <link rel="preload" href="./fonts/DMMono-Medium.ttf" as="font" type="font/ttf" crossorigin="anonymous">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <link rel="stylesheet" href="output.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-[#FDFDFD] overflow-x-hidden overflow-y-auto relative w-full">
    <div class="fixed inset-0 pointer-events-none overflow-hidden" style="z-index: 0;">
        <div class="blob absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full" style="background: rgba(255, 133, 170, 0.15); filter: blur(100px);"></div>
        <div class="blob absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] rounded-full" style="background: rgba(255, 112, 0, 0.15); filter: blur(120px);"></div>
        <div class="blob absolute top-[20%] right-[10%] w-[40vw] h-[40vw] rounded-full" style="background: rgba(50, 90, 241, 0.15); filter: blur(80px);"></div>
    </div>

    <nav id="navbar">
        <div id="nav-logo"></div>
        <div class="locale-switch" aria-label="Language switcher">
            <button type="button" class="locale-switch-button is-active" data-locale-switch="nl">NL</button>
            <button type="button" class="locale-switch-button" data-locale-switch="en">EN</button>
        </div>
        <button id="hamburger-btn" class="nav-hamburger" aria-label="Open navigation menu" aria-expanded="false" aria-controls="mobile-menu">
            <span class="nav-hamburger-line"></span>
            <span class="nav-hamburger-line"></span>
            <span class="nav-hamburger-line"></span>
        </button>
        <ul id="nav-links" class="nav-links"></ul>
    </nav>

    <div id="mobile-menu" class="mobile-menu" aria-hidden="true">
        <ul id="mobile-nav-links" class="mobile-nav-links"></ul>
    </div>

    <section id="hero" class="w-full flex flex-col justify-center items-center relative" style="height: 100vh; height: 100dvh;">

        <div id="logo-grid" class="relative z-10 w-full px-4 flex flex-wrap justify-center gap-y-4"></div>

        <div class="absolute bottom-20 md:bottom-10 z-10 opacity-0 subtitle-anim">
            <div id="hero-subtitle-content" class="hero-rich-text rich-content text-center text-gray-500 tracking-[0.2em] text-sm md:text-base font-bold">
                <p>Empowering Queer Art</p>
            </div>
        </div>

        <div class="hero-scroll-hint absolute bottom-4 z-10 opacity-0 subtitle-anim">
            <svg width="20" height="28" viewBox="0 0 20 28" fill="none" class="animate-scroll-hint">
                <rect x="1" y="1" width="18" height="26" rx="9" stroke="#9ca3af" stroke-width="1.5"/>
                <circle cx="10" cy="8" r="2" fill="#9ca3af" class="scroll-dot"/>
            </svg>
        </div>
    </section>

    <main id="sections-root"></main>

    <script type="module" src="script.js"></script>
</body>

</html>
